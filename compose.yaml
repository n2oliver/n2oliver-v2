services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.php
    ports:
      - 8000:80
    volumes:
      - ./api:/var/www/html/api
    environment:
      REACT_APP_URL: ${REACT_APP_URL}
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.react
    container_name: react-app
    working_dir: /src
    ports:
      - "3000:3000"
    volumes:
      - ./:/src
      - /src/node_modules
    env_file:
      - .env.development
    depends_on:
      - backend
    stdin_open: true
    tty: true
    restart: unless-stopped
    develop:
      watch:
        - path: . # Path to monitor for changes
          action: rebuild # Action to take: rebuild the image and recreate the container
        - path: ./package.json # Example for specific file requiring rebuild
          action: rebuild